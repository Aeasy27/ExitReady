<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{font-family:'DM Sans',sans-serif;background:#0D1117;color:#E8E4DC;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

input,textarea,select{

select option{background:var(--navy3);color:var(--cream)}
label{display:block;font-size:11px;font-weight:600;color:var(--slate);margin-bottom:6px;letter-spacing:0.06em;text-transform:uppercase}
textarea{resize:vertical;line-height:1.6}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;border-radius:8px;font-size:14px;font-weight:500;transition:all 0.2s}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0D1117;padding:12px 28px;font-weight:700}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,168,76,0.35)}
.btn-gold:active{transform:translateY(0)}
.btn-gold:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--cream);padding:10px 20px}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-ghost{background:transparent;color:var(--slate);padding:8px 16px}
.btn-ghost:hover{color:var(--cream)}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.04em}
.badge-gold{background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.25)}
.badge-green{background:rgba(82,183,136,0.12);color:var(--green);border:1px solid rgba(82,183,136,0.25)}
.badge-red{background:rgba(232,118,90,0.12);color:var(--red);border:1px solid rgba(232,118,90,0.25)}
.card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:24px}
.divider{height:1px;background:var(--border);margin:20px 0}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width 0.4s ease}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field-group{margin-bottom:18px}
.radio-group{display:flex;gap:10px;flex-wrap:wrap}

.logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--cream);letter-spacing:-0.02em;cursor:pointer;user-select:none}

@media(max-width:768px){

  .how-section{padding:0 20px 60px}

  .pricing-section{padding:0 20px 80px}

  .form-row{grid-template-columns:1fr}

  .deck-slide{padding:24px}
  .watermark-text{font-size:28px}
}
.tip-wrap{position:relative;display:inline-flex;align-items:center;cursor:help;vertical-align:middle;margin-left:4px}
.tip-icon{width:15px;height:15px;border-radius:50%;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:var(--gold);font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Sans',sans-serif;font-style:normal;line-height:1}
.tip-box{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);width:290px;background:var(--navy3);border:1px solid var(--border2);border-radius:10px;padding:13px 15px;font-size:12px;color:var(--cream);line-height:1.65;z-index:999;font-weight:400;text-transform:none;letter-spacing:0;box-shadow:0 8px 28px rgba(0,0,0,0.5)}

.profile-sub-card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:12px;transition:border-color 0.2s}
.profile-sub-card:hover{border-color:rgba(201,168,76,0.3)}
.slide-thumb-wrap{cursor:pointer;border-radius:10px;overflow:hidden;border:2px solid transparent;transition:all 0.18s}
.slide-thumb-wrap:hover{border-color:rgba(201,168,76,0.4);transform:translateY(-1px)}
.slide-thumb-wrap.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.admin-login-modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(4px)}
</style>

/* ── Hoisted form primitives (OUTSIDE all components) ──────────
   These must live at module scope so React never remounts them
   on parent re-render, which was causing the focus-loss bug.     */
function Field({label, tip, tipHref, value, onChange, placeholder, type='text', rows}){
  return(
    <div className="field-group">
      {label && <label style={{display:'flex',alignItems:'center',gap:'4px',flexWrap:'wrap'}}>{label}{tip&&<Tip text={tip} href={tipHref}/>}</label>}
      {rows
        ? <textarea rows={rows} placeholder={placeholder} value={value} onChange={onChange}/>
        : <input type={type} placeholder={placeholder} value={value} onChange={onChange}/>
      }
    </div>
  );
}

function Picker({label, tip, tipHref, value, onChange, opts}){
  return(
    <div className="field-group">
      {label && <label style={{display:'flex',alignItems:'center',gap:'4px',flexWrap:'wrap'}}>{label}{tip&&<Tip text={tip} href={tipHref}/>}</label>}
      <div className="radio-group">
        {opts.map(o=>(
          <div key={o} className={`radio-pill${value===o?' selected':''}`} onClick={()=>onChange(o)}>{o}</div>
        ))}
      </div>
    </div>
  );
}

function SelectField({label, tip, tipHref, value, onChange, opts}){
  return(
    <div className="field-group">
      {label && <label style={{display:'flex',alignItems:'center',gap:'4px',flexWrap:'wrap'}}>{label}{tip&&<Tip text={tip} href={tipHref}/>}</label>}
      <select value={value} onChange={e=>onChange(e.target.value)}>
        {opts.map(o=><option key={o} value={o}>{o}</option>)}
      </select>

  );
}

function Tip({text, href}){
  return(
    <span className="tip-wrap">

}

/* ── PPTX Generator ─────────────────────────────────────── */
function generatePPTX(data, watermark){
  if(typeof PptxGenJS==='undefined'){alert('PptxGenJS is still loading — please try again in a moment.');return;}
  const pptx = new PptxGenJS();

        purchases:{deck:s.deck_paid||false,excel:s.excel_paid||false},
        bizName:s.biz_name||s.form_data?.bizName||'Untitled',
        industry:s.industry||'—',asking:s.asking||'—',rev1:s.rev1||'—',
        date:s.date||new Date(s.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
      }));
      setUserSubs(fmt);
      return fmt;
    }catch(e){console.error('loadUserSubs:',e);return[];}
  };

  const mapSbUser=sb=>({
    id:sb.id,email:sb.email,
    name:sb.user_metadata?.name||sb.user_metadata?.full_name||sb.email.split('@')[0],
    phone:sb.user_metadata?.phone||'',
  });

  useEffect(()=>{
    const isOAuthReturn=window.location.search.includes('code=')||window.location.hash.includes('access_token=');
    supabase.auth.getSession().then(({data:{session}})=>{
      if(session?.user){
        const u=mapSbUser(session.user);
        setUser(u);
        loadUserSubs(u.id);
        if(isOAuthReturn){
          setView('form');
          window.history.replaceState({},document.title,window.location.pathname);
        }
      }
      setAuthLoading(false);
    });
    const {data:{subscription}}=supabase.auth.onAuthStateChange((event,session)=>{
      if(event==='SIGNED_OUT'){setUser(null);setUserSubs([]);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleLogin=async(u)=>{
    setUser(u);
    if(u.role==='admin'){
      setView('admin');
    } else {
      await loadUserSubs(u.id);
      setView('form');
    }
  };

  const handleLogout=async()=>{
    if(user&&user.role!=='admin') await supabase.auth.signOut();
    setUser(null);
    setUserSubs([]);
    setFormData({});
    setEditingSubId(null);
    setPurchases({deck:false,excel:false});
    setView('landing');
  };

  const persistSub=async(formD,purc,subId)=>{
    if(!user||user.role==='admin')return subId;
    const row={
      user_id:user.id,form_data:formD,
      deck_paid:purc.deck||false,excel_paid:purc.excel||false,
      biz_name:formD.bizName||'Untitled Business',industry:formD.industry||'—',
      asking:formD.asking||'—',rev1:formD.rev1||'—',
      date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    };
    try{
      if(subId){
        const {data,error}=await supabase.from('submissions').update(row).eq('id',subId).select().single();
        if(error){console.error('update sub:',error);return subId;}
        loadUserSubs(user.id);
        return data.id;
      } else {
        const {data,error}=await supabase.from('submissions').insert(row).select().single();
        if(error){console.error('insert sub:',error);return null;}
        loadUserSubs(user.id);
        return data.id;
      }
    }catch(e){console.error('persistSub:',e);return subId;}
  };

  const handleFormDone=async(d)=>{
    setFormData(d);
    if(user&&user.role!=='admin'){
      const id=await persistSub(d,purchases,editingSubId);
      if(!editingSubId&&id)setEditingSubId(id);
    }
    setView('result');
  };

  const handlePay=product=>{setPayProduct(product);setPayModal(true)};
  const handlePayConfirm=async()=>{
    const np={...purchases};
    if(payProduct==='deck')np.deck=true;
    if(payProduct==='excel')np.excel=true;
    if(payProduct==='bundle'){np.deck=true;np.excel=true;}
    setPurchases(np);
    setPayModal(false);
    if(user&&editingSubId){
      try{
        await supabase.from('submissions').update({deck_paid:np.deck,excel_paid:np.excel}).eq('id',editingSubId);
        loadUserSubs(user.id);
      }catch(e){console.error('pay update:',e);}
    }
    if(payProduct==='deck'||payProduct==='bundle'){generatePPTX(formData,false);notify('✓ Clean deck downloaded!');}
    if(payProduct==='excel'||payProduct==='bundle'){generateExcel(formData);notify('✓ Excel model downloaded!');}
  };

  const handleEditSub=sub=>{
    setFormData(sub.formData);
    setPurchases(sub.purchases||{deck:false,excel:false});
    setEditingSubId(sub.id);
    setView('form');
  };

  const handleNewSubmission=()=>{
    setFormData({});
    setPurchases({deck:false,excel:false});
    setEditingSubId(null);
    setView(user?'form':'auth');
  };

  if(authLoading)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:'16px'}}>
      <div style={{width:'40px',height:'40px',border:'3px solid var(--border2)',borderTopColor:'var(--gold)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <div style={{color:'var(--slate)',fontSize:'14px'}}>Loading ExitReady...</div>
    </div>
  );

  return(
    <div>
      <Nav view={view} setView={setView} user={user} onLogout={handleLogout} onGetStarted={handleNewSubmission}/>
      {view==='landing'&&<Landing onGetStarted={handleNewSubmission}/>}
      {view==='auth'&&<Auth onAuth={handleLogin}/>}
      {view==='form'&&<IntakeForm user={user} initialData={formData} onDone={handleFormDone}/>}
      {view==='result'&&<ResultView formData={formData} purchases={purchases} onPay={handlePay} user={user} setView={setView}/>}
      {view==='profile'&&<ProfilePage user={user} userSubs={userSubs} onEdit={handleEditSub} onNew={handleNewSubmission} onDownloadDeck={sub=>{generatePPTX(sub.formData,false);notify('✓ Deck re-downloaded!');}} onDownloadExcel={sub=>{generateExcel(sub.formData);notify('✓ Excel re-downloaded!');}}/>}
      {view==='admin'&&<AdminDash adminTab={adminTab} setAdminTab={setAdminTab} submissions={submissions} setSubmissions={setSubmissions} selectedSub={selectedSub} setSelectedSub={setSelectedSub}/>}
      {payModal&&<PayModal product={payProduct} onConfirm={handlePayConfirm} onClose={()=>setPayModal(false)}/>}
      {notification&&<div className="notification">{notification}</div>}
      <footer className="footer">
        © 2026 ExitReady · All rights reserved ·{' '}
        <span style={{color:'var(--gold)',cursor:'pointer'}}>Privacy Policy</span> ·{' '}
        <span style={{color:'var(--gold)',cursor:'pointer'}}>Terms of Service</span>
      </footer>
    </div>
  );
}

function Auth({onAuth}){
  const [mode,setMode]=useState('signup');
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [phone,setPhone]=useState('');
  const [contactTime,setContactTime]=useState('');
  const [pass,setPass]=useState('');
  const [error,setError]=useState('');
  const [info,setInfo]=useState('');
  const [busy,setBusy]=useState(false);

  const handleSubmit=async()=>{
    setError('');setInfo('');
    if(!email||!pass){setError('Email and password are required.');return;}
    // Admin login (not a Supabase user)
    if(email.toLowerCase()==='admin'&&pass==='Admin123'){
      onAuth({name:'Administrator',email:'Admin',role:'admin'});
      return;
    }
    setBusy(true);
    if(mode==='signup'){
      const {data,error:e}=await supabase.auth.signUp({
        email,password:pass,
        options:{data:{name:name||email.split('@')[0],phone,contactTime}},
      });
      if(e){setError(e.message);setBusy(false);return;}
      if(data.session&&data.user){
        // Email confirmation disabled — signed in immediately
        onAuth({id:data.user.id,email:data.user.email,name:name||email.split('@')[0],phone});
      } else {
        // Email confirmation required
        setInfo('Account created! Check your inbox for a confirmation link, then sign in.');
        setMode('login');
      }
    } else {
      const {data,error:e}=await supabase.auth.signInWithPassword({email,password:pass});
      if(e){setError(e.message);setBusy(false);return;}
      if(data.user){
        const sb=data.user;
        onAuth({id:sb.id,email:sb.email,name:sb.user_metadata?.name||sb.email.split('@')[0],phone:sb.user_metadata?.phone||''});
      }
    }
    setBusy(false);
  };

  return(
    <div className="auth-box">
      <div style={{textAlign:'center',marginBottom:'32px'}}>
        <div className="section-label" style={{marginBottom:'8px'}}>{mode==='signup'?'Get Started Free':'Welcome Back'}</div>
        <h2 className="serif" style={{fontSize:'34px',color:'var(--cream)',letterSpacing:'-0.02em'}}>{mode==='signup'?'Create Your Account':'Sign In to ExitReady'}</h2>
      </div>
      <div className="card">
        {mode==='signup'&&(
          <div className="field-group"><label>Full Name *</label>
            <input placeholder="Your full name" value={name} onChange={e=>setName(e.target.value)}/>
          </div>
        )}
        <div className="field-group"><label>Email Address *</label>
          <input type="email" placeholder="you@company.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        {mode==='signup'&&(<>
          <div className="field-group"><label>Phone Number</label>
            <input type="tel" placeholder="(555) 000-0000" value={phone} onChange={e=>setPhone(e.target.value)}/>
          </div>
          <div className="field-group"><label>Best Time to Contact</label>
            <select value={contactTime} onChange={e=>setContactTime(e.target.value)}>
              <option value="">Select preferred time...</option>
              <option>Morning (8am–12pm)</option>
              <option>Afternoon (12pm–5pm)</option>
              <option>Evening (5pm–8pm)</option>
              <option>Anytime</option>
            </select>
          </div>
        </>)}
        <div className="field-group"><label>Password</label>
          <input type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSubmit()}/>
        </div>
        {info&&<div style={{background:'rgba(82,183,136,0.08)',border:'1px solid rgba(82,183,136,0.25)',borderRadius:'8px',padding:'10px 14px',marginBottom:'12px',fontSize:'13px',color:'var(--green)'}}>{info}</div>}
        {error&&<div style={{background:'rgba(232,118,90,0.08)',border:'1px solid rgba(232,118,90,0.25)',borderRadius:'8px',padding:'10px 14px',marginBottom:'12px',fontSize:'13px',color:'var(--red)'}}>{error}</div>}
        <button className="btn-gold" style={{width:'100%',padding:'14px',marginTop:'8px',fontSize:'15px'}} disabled={busy} onClick={handleSubmit}>
          {busy?'Please wait…':(mode==='signup'?'Create Account & Continue →':'Sign In →')}
        </button>
        <div style={{textAlign:'center',margin:'18px 0 6px',color:'var(--slate)',fontSize:'13px'}}>or</div>
        <button className="btn-outline" style={{width:'100%',padding:'12px',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px'}} onClick={async()=>{
          await supabase.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.href.split('?')[0].split('#')[0]}});
        }}>
          <span style={{fontSize:'16px',fontWeight:'700'}}>G</span> Continue with Google
        </button>
      </div>
      <div className="auth-toggle" onClick={()=>{setMode(mode==='signup'?'login':'signup');setError('');setInfo('');}}>
        {mode==='signup'?<>Already have an account? <span>Sign in</span></>:<>New here? <span>Create account</span></>}
      </div>
      <div style={{textAlign:'center',marginTop:'20px',padding:'14px',background:'rgba(201,168,76,0.04)',borderRadius:'10px',border:'1px solid rgba(201,168,76,0.12)'}}>
        <div style={{fontSize:'11px',color:'var(--slate)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.06em',fontWeight:'600'}}>Admin Access</div>
        <div style={{fontSize:'12px',color:'var(--slate)'}}>Username: <span style={{color:'var(--gold)'}}>Admin</span> · Password: <span style={{color:'var(--gold)'}}>Admin123</span></div>
      </div>
    </div>
  );
}

/* ── Intake Form — Field components are hoisted above App so
   React never unmounts them on state change (fixes focus bug) ── */
function IntakeForm({user,initialData,onDone}){
  const [step,setStep]=useState(0);
  const [data,setData]=useState(()=>
    Object.keys(initialData||{}).length>0
      ? initialData
      : {...EMPTY_FORM,ownerName:user?.name||'',ownerEmail:user?.email||'',ownerPhone:user?.phone||''}
  );

  // Stable setter — never changes reference
  const set=useCallback((k,v)=>setData(d=>({...d,[k]:v})),[]);

  const pct=Math.round((step/(STEP_LABELS.length-1))*100);

  return(
    <div className="form-container">
      {/* Progress */}
      <div style={{marginBottom:'32px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
          <div style={{fontSize:'13px',color:'var(--slate)'}}>Step {step+1} of {STEP_LABELS.length} — <span style={{color:'var(--gold)',fontWeight:'500'}}>{STEP_LABELS[step]}</span></div>
          <div style={{fontSize:'13px',color:'var(--slate)'}}>{pct}%</div>
        </div>
        <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
        <div style={{display:'flex',gap:'6px',marginTop:'12px',justifyContent:'space-between'}}>
          {STEP_LABELS.map((_,i)=><div key={i} className={`step-dot${i===step?' active':i<step?' done':''}`}/>)}
        </div>
      </div>

      {/* Step 0 – Overview */}
      {step===0&&(
        <div>
          <div className="step-header"><h2>Business Overview</h2><p>Give buyers a clear picture of what your business is and who's behind it.</p></div>
          <Field label="Business Legal Name *" tip="The official registered name of your business as it appears on legal documents, contracts, and government filings. This may differ from the name you use day-to-day." value={data.bizName} onChange={e=>set('bizName',e.target.value)} placeholder="Acme Holdings LLC"/>
          <Field label="DBA / Trade Name (if different)" tip="'Doing Business As' — the name your company operates under publicly if it differs from the legal entity name. For example, 'John Smith LLC' might do business as 'Smith Plumbing'." tipHref="https://www.investopedia.com/terms/d/doing-business-as.asp" value={data.dba} onChange={e=>set('dba',e.target.value)} placeholder="Acme Co."/>
          <SelectField label="Industry / Sector *" tip="Select the category that best describes your primary business activity. Buyers and investors use this to compare your business to industry benchmarks and similar transactions." value={data.industry} onChange={v=>set('industry',v)} opts={INDUSTRIES}/>
          <Field label="Business Description *" tip="Write a plain-English summary of what your business does, how it generates revenue, and what sets it apart from competitors. Think of this as your elevator pitch to a potential buyer — be specific, honest, and compelling." value={data.description} onChange={e=>set('description',e.target.value)} placeholder="Describe what your business does, how it makes money, and what makes it unique..." rows={4}/>
          <div className="form-row">
            <Field label="Year Founded *" tip="The calendar year your business was officially formed or began operations. Longer operating history generally signals stability and reduced risk to buyers." value={data.founded} onChange={e=>set('founded',e.target.value)} placeholder="2018"/>
            <SelectField label="Business Structure" tip="The legal entity type of your business, which affects taxes, liability, and how the acquisition is structured. LLC and S-Corp are the most common for small businesses. Each type has different tax and legal implications for buyers." tipHref="https://www.investopedia.com/terms/b/business-structure.asp" value={data.structure} onChange={v=>set('structure',v)} opts={['LLC','S-Corp','C-Corp','Sole Proprietor','Partnership','Other']}/>
          </div>
          <div className="form-row">
            <Field label="Full-Time Employees" tip="The number of employees who work 35+ hours per week. Headcount is a key operational metric buyers use to assess infrastructure, labor costs, and scalability." value={data.employees} onChange={e=>set('employees',e.target.value)} placeholder="12"/>
            <Field label="Part-Time Employees" tip="Employees working fewer than 35 hours per week on a regular basis. Include consistent part-timers but generally exclude independent contractors or one-off freelancers unless they are integral to daily operations." value={data.empPT} onChange={e=>set('empPT',e.target.value)} placeholder="4"/>
          </div>
          <div className="form-row">
            <Field label="State of Incorporation" tip="The U.S. state where your business was legally formed — not necessarily where you operate. Delaware and Wyoming are common choices for favorable tax and liability laws, but most small businesses are incorporated in their home state." value={data.state} onChange={e=>set('state',e.target.value)} placeholder="Delaware"/>
            <Field label="Primary Operating Location" tip="The city and state where your business primarily operates day-to-day. Location affects your customer base, labor market, tax obligations, and the pool of potential buyers who may be interested." value={data.location} onChange={e=>set('location',e.target.value)} placeholder="Austin, TX"/>
          </div>
          <Field label="Website URL" tip="Your business's primary website URL. Buyers will visit it to independently evaluate your brand, product quality, customer reviews, and online presence before engaging further." value={data.website} onChange={e=>set('website',e.target.value)} placeholder="https://yourcompany.com"/>
          <Field label="Social Media Handles (optional)" tip="Links or handles for your business's social media accounts (Instagram, LinkedIn, Facebook, TikTok, etc.). A meaningful social following or engaged community can be a valuable asset that contributes to overall business value." value={data.social} onChange={e=>set('social',e.target.value)} placeholder="@yourcompany"/>
        </div>
      )}

      {/* Step 1 – Financials */}
      {step===1&&(
        <div>
          <div className="step-header"><h2>Financial Snapshot</h2><p>Investors make or break decisions based on numbers. Be as accurate as possible.</p></div>
          <div className="info-box-gold">💡 Year 1 = most recent full year. Use whole dollar amounts (e.g. $420,000).</div>
          <label style={{marginBottom:'12px',display:'flex',alignItems:'center',gap:'4px'}}>Annual Revenue — Last 3 Years<Tip text="Total revenue is all income generated before subtracting any expenses. Use your P&L statement or tax returns as the source. Year 1 = most recent complete fiscal year. Enter whole dollar amounts (e.g. $420,000)." href="https://www.investopedia.com/terms/r/revenue.asp"/></label>
          <div className="form-row">
            <Field label="Year 1 (Most Recent) *" value={data.rev1} onChange={e=>set('rev1',e.target.value)} placeholder="$420,000"/>
            <Field label="Year 2" value={data.rev2} onChange={e=>set('rev2',e.target.value)} placeholder="$310,000"/>
          </div>
          <Field label="Year 3" value={data.rev3} onChange={e=>set('rev3',e.target.value)} placeholder="$245,000"/>
          <label style={{marginBottom:'12px',display:'flex',alignItems:'center',gap:'4px',marginTop:'4px'}}>Annual EBITDA / Net Profit — Last 3 Years<Tip text="EBITDA (Earnings Before Interest, Taxes, Depreciation & Amortization) is the most commonly used profitability metric in business acquisitions — it approximates the true cash a business generates. If unsure, net profit from your tax return is acceptable." href="https://www.investopedia.com/terms/e/ebitda.asp"/></label>
          <div className="form-row">
            <Field label="Year 1 (Most Recent)" value={data.ebitda1} onChange={e=>set('ebitda1',e.target.value)} placeholder="$140,000"/>
            <Field label="Year 2" value={data.ebitda2} onChange={e=>set('ebitda2',e.target.value)} placeholder="$95,000"/>
          </div>
          <Field label="Year 3" value={data.ebitda3} onChange={e=>set('ebitda3',e.target.value)} placeholder="$72,000"/>
          <div className="form-row">
            <Field label="Gross Margin %" tip="Gross margin is the percentage of revenue remaining after subtracting direct costs (COGS). Formula: (Revenue − COGS) ÷ Revenue × 100. A higher gross margin signals a more scalable and profitable business. Service businesses often run 50–80%; product businesses 20–50%." tipHref="https://www.investopedia.com/terms/g/grossmargin.asp" value={data.grossMargin} onChange={e=>set('grossMargin',e.target.value)} placeholder="68%"/>
            <Field label="Monthly Recurring Revenue (MRR)" tip="MRR is the predictable monthly revenue from subscriptions, retainers, or recurring contracts. High MRR is extremely attractive to buyers because it signals revenue predictability and dramatically reduces acquisition risk." tipHref="https://www.investopedia.com/terms/m/monthly-recurring-revenue.asp" value={data.mrr} onChange={e=>set('mrr',e.target.value)} placeholder="$28,000"/>
          </div>
          <Field label="Revenue Stream 1 (Primary Source)" tip="A revenue stream is a distinct source of income within your business. Identifying your top streams helps buyers understand revenue concentration, predictability, and diversification. Most businesses have 1–3 primary streams." value={data.revStream1} onChange={e=>set('revStream1',e.target.value)} placeholder="e.g. SaaS subscriptions — 70% of revenue"/>
          <div className="form-row">
            <Field label="Revenue Stream 2" value={data.revStream2} onChange={e=>set('revStream2',e.target.value)} placeholder="e.g. Professional services"/>
            <Field label="Revenue Stream 3" value={data.revStream3} onChange={e=>set('revStream3',e.target.value)} placeholder="e.g. Licensing fees"/>
          </div>
          <Picker label="Outstanding Debts or Liabilities?" tip="Any loans, lines of credit, accounts payable, deferred revenue, or other financial obligations your business currently carries. These typically must be disclosed and either assumed or settled at closing, so buyers need full visibility upfront." tipHref="https://www.investopedia.com/terms/l/liability.asp" value={data.hasDebts} onChange={v=>set('hasDebts',v)} opts={['Yes','No']}/>
          <Picker label="Do You Have Audited Financials?" tip="Audited financials are reviewed and certified by an independent CPA to verify their accuracy and completeness. Having audited or 'reviewed' financials significantly increases buyer confidence and can positively impact your valuation multiple." tipHref="https://www.investopedia.com/terms/a/auditedfinancialstatements.asp" value={data.hasAudited} onChange={v=>set('hasAudited',v)} opts={['Yes','No','Reviewed Only']}/>
          <Picker label="Share Financials Under NDA?" tip="A Non-Disclosure Agreement (NDA) is a legal contract requiring buyers to keep your sensitive financial and business information confidential. Requiring an NDA before sharing financials is standard practice in M&A and protects your business if a deal falls through." tipHref="https://www.investopedia.com/terms/n/nda.asp" value={data.ndaOk} onChange={v=>set('ndaOk',v)} opts={['Yes','No']}/>
          <Field label="Asking Price *" tip="The purchase price you are seeking for 100% of the business. Common valuations are expressed as a multiple of EBITDA (e.g., '3x EBITDA') or revenue. If you're unsure of a number, enter 'Open to offers' — this is a perfectly acceptable and common approach." tipHref="https://www.investopedia.com/terms/v/valuation.asp" value={data.asking} onChange={e=>set('asking',e.target.value)} placeholder="$650,000 or 'Open to offers'"/>
          <Field label="Valuation Justification" tip="Explain how you arrived at your asking price. Common methods: EBITDA multiples (most common for SMBs), revenue multiples, asset value, or comparable business sales you are aware of. Buyers are far more likely to engage when they understand your reasoning." tipHref="https://www.investopedia.com/terms/v/valuationmultiples.asp" value={data.valJustification} onChange={e=>set('valJustification',e.target.value)} placeholder="How did you arrive at this number? (e.g. 3x EBITDA, comparable sales...)" rows={3}/>
        </div>
      )}

      {/* Step 2 – Operations */}
      {step===2&&(
        <div>
          <div className="step-header"><h2>Operations</h2><p>Help buyers understand what it truly takes to run this business day-to-day.</p></div>
          <div className="field-group">
            <label style={{display:'flex',alignItems:'center',gap:'4px',flexWrap:'wrap'}}>Owner Dependency — 1 = fully dependent on you · 5 = runs without you<Tip text="How reliant is this business on you personally to function? A score of 1 means the business cannot operate without you; 5 means it runs completely without owner involvement. Buyers pay a significant premium for businesses that operate independently of the owner — this is one of the most impactful factors in valuation." href="https://www.investopedia.com/terms/k/key-man-clause.asp"/></label>
            <div style={{display:'flex',gap:'16px',alignItems:'center',marginTop:'8px'}}>
              <span style={{fontSize:'12px',color:'var(--slate)',whiteSpace:'nowrap'}}>Fully dependent</span>
              <input type="range" min="1" max="5" step="1" value={data.ownerDep} onChange={e=>set('ownerDep',parseInt(e.target.value))} style={{flex:1}}/>
              <span style={{fontSize:'12px',color:'var(--slate)',whiteSpace:'nowrap'}}>Fully independent</span>
              <span style={{fontSize:'18px',fontWeight:'600',color:'var(--gold)',minWidth:'24px',textAlign:'center'}}>{data.ownerDep}</span>
            </div>
          </div>
          <Picker label="Management Team In Place?" tip="A management team that can operate independently of the owner is one of the most valuable assets a business can have. Buyers fear key people will leave post-acquisition, so demonstrating team depth significantly de-risks the deal and supports a higher valuation." value={data.hasMgmt} onChange={v=>set('hasMgmt',v)} opts={['Yes','No','Partial']}/>
          {(data.hasMgmt==='Yes'||data.hasMgmt==='Partial')&&(
            <Field label="Management Team Details (names & roles)" value={data.mgmtDetails} onChange={e=>set('mgmtDetails',e.target.value)} placeholder="e.g. Jane Smith — Operations Manager (8 yrs), Tom Lee — Sales Director..." rows={2}/>
          )}
          <Field label="Key Employees / Critical Dependencies" tip="Identify which specific employees are critical to operations, customer relationships, or revenue. Also note whether they are likely to remain after a sale — buyers often require key-employee retention agreements (with bonuses or equity) as a condition of closing." value={data.keyEmployees} onChange={e=>set('keyEmployees',e.target.value)} placeholder="Who are the essential people — and would they stay with a new owner?"/>
          <Picker label="Any Single Customer Represents >20% of Revenue?" tip="Customer concentration risk means a large portion of your revenue depends on very few customers. If a single customer accounts for more than 20% of revenue, buyers will flag it as a risk — because losing that customer post-acquisition could severely impact cash flow. Be transparent; buyers will find this during diligence." tipHref="https://www.investopedia.com/terms/c/concentration-risk.asp" value={data.custConcentration} onChange={v=>set('custConcentration',v)} opts={['Yes','No']}/>
          <div className="form-row">
            <Field label="Number of Active Customers / Clients" tip="The count of distinct paying customers or clients who have transacted with your business in the last 12 months. More customers generally equals more diversified revenue, lower concentration risk, and a more attractive acquisition target." value={data.activeCust} onChange={e=>set('activeCust',e.target.value)} placeholder="450"/>
            <Field label="Average Contract / Relationship Length" tip="The typical duration of your customer relationships or contracts (in months or years). Longer average relationships signal high customer retention, switching costs, and revenue predictability — all of which increase business value and buyer confidence." value={data.avgContract} onChange={e=>set('avgContract',e.target.value)} placeholder="24 months"/>
          </div>
          <Picker label="Documented SOPs / Operating Procedures?" tip="Standard Operating Procedures (SOPs) are written step-by-step instructions for how recurring tasks are performed. Documented SOPs signal that the business is systematized and can be run by someone other than the current owner — a critical factor in buyer confidence and post-acquisition success." value={data.hasSOPs} onChange={v=>set('hasSOPs',v)} opts={['Yes','No','Partial']}/>
          <Field label="Tech Stack / Key Software Tools" tip="List the primary software platforms and tools your business uses to operate (e.g., QuickBooks for accounting, HubSpot for CRM, Shopify for e-commerce). This helps buyers assess integration complexity, technology costs, and any technical dependencies post-acquisition." value={data.techStack} onChange={e=>set('techStack',e.target.value)} placeholder="QuickBooks, HubSpot, Shopify, Slack, etc." rows={2}/>
          <Field label="Physical Assets Included in the Sale" tip="Tangible, physical items included in the sale such as equipment, vehicles, inventory, real estate, or furnishings. These contribute to the total asset value of the business and can significantly affect how the deal is structured and priced." tipHref="https://www.investopedia.com/terms/t/tangibleasset.asp" value={data.physicalAssets} onChange={e=>set('physicalAssets',e.target.value)} placeholder="Equipment, vehicles, inventory, real estate, fixtures..." rows={2}/>
          <Field label="Intellectual Property" tip="Intangible assets owned by the business such as patents, trademarks, copyrights, proprietary software, customer lists, brand assets, or valuable domain names. IP can be among the most valuable components of a business — especially in tech, media, or consumer brands." tipHref="https://www.investopedia.com/terms/i/intellectualproperty.asp" value={data.ip} onChange={e=>set('ip',e.target.value)} placeholder="Patents, trademarks, proprietary software, domain names..."/>
        </div>
      )}

      {/* Step 3 – Market */}
      {step===3&&(
        <div>
          <div className="step-header"><h2>Market & Growth</h2><p>Show buyers the opportunity ahead — not just the history behind you.</p></div>
          <div className="info-box-gold">💡 This section is often the most persuasive part of the deck. Be specific and honest.</div>
          <Field label="Biggest Growth Opportunities for a New Owner" tip="Describe specific, actionable ways a new and well-capitalized owner could grow the business beyond its current state. Think: new geographic markets, untapped sales channels, product line expansion, operational efficiency improvements, or strategic partnerships. This is often the most persuasive section of an investor deck." value={data.growthOps} onChange={e=>set('growthOps',e.target.value)} placeholder="What could a well-capitalized buyer do with this business that you haven't been able to?" rows={3}/>
          <Field label="What Has Prevented You from Pursuing Those?" tip="Be honest about what has held you back from capturing those growth opportunities. Buyers want to understand whether the constraint was personal (time, interest, bandwidth) or structural (market conditions, capital requirements). Personal constraints are often viewed as opportunities by a new owner; structural constraints may be risks." value={data.barriers} onChange={e=>set('barriers',e.target.value)} placeholder="Time, capital, bandwidth, expertise, personal priorities..." rows={2}/>
          <div className="form-row">
            <Field label="Top Competitor #1" tip="List your primary direct competitors by name or website. Buyers will independently research your competitive landscape — being transparent and knowledgeable about competition signals market awareness and confidence. Include both direct (same product/service) and indirect (different approach, same customer need) competitors." value={data.comp1} onChange={e=>set('comp1',e.target.value)} placeholder="CompetitorA.com"/>
            <Field label="Top Competitor #2" value={data.comp2} onChange={e=>set('comp2',e.target.value)} placeholder="CompetitorB.com"/>
          </div>
          <Field label="Top Competitor #3 (optional)" value={data.comp3} onChange={e=>set('comp3',e.target.value)} placeholder="CompetitorC.com"/>
          <Field label="Competitive Advantage / Moat" tip="An economic 'moat' is a durable competitive advantage that makes your business genuinely difficult for competitors to replicate. Examples: proprietary technology or software, exclusive supplier relationships, strong brand loyalty, network effects, high customer switching costs, or regulatory barriers to entry. Be specific — vague claims like 'great customer service' are less compelling than concrete defensible advantages." tipHref="https://www.investopedia.com/terms/e/economicmoat.asp" value={data.moat} onChange={e=>set('moat',e.target.value)} placeholder="What makes this business genuinely hard to replicate?" rows={3}/>
          <Field label="Total Addressable Market (TAM) Estimate" tip="TAM is the total annual revenue opportunity available if your business captured 100% of its target market. Even a rough estimate helps buyers understand the scale of the opportunity. Example: '$2B annual U.S. market for residential HVAC services' or '$500M market for B2B HR software in the SMB segment'. Use industry reports or publicly available data if possible." tipHref="https://www.investopedia.com/terms/t/total-addressable-market.asp" value={data.tam} onChange={e=>set('tam',e.target.value)} placeholder="e.g. '$2B U.S. market for residential HVAC services in the Southeast'"/>
          <Field label="Pending Contracts / Partnerships" tip="Any signed or near-signed agreements that a buyer would inherit, such as a new enterprise customer contract, a strategic distribution partnership, or a vendor agreement. These represent tangible, near-term future value that can strengthen your valuation and attract more serious buyers." value={data.pendingContracts} onChange={e=>set('pendingContracts',e.target.value)} placeholder="Any signed or near-signed deals a buyer would inherit?" rows={2}/>
          <Field label="Regulatory or Legal Risks Buyer Should Know About" tip="Disclose any active lawsuits, regulatory investigations, pending license renewals, compliance obligations, or other legal matters a buyer should know about. Transparency is critical — failure to disclose material risks can void a transaction after closing or create significant legal liability for you as the seller. Enter 'None' if not applicable." value={data.legalRisks} onChange={e=>set('legalRisks',e.target.value)} placeholder="Licenses, lawsuits, compliance... (enter 'None' if not applicable)"/>
        </div>
      )}

      {/* Step 4 – Deal Terms */}
      {step===4&&(
        <div>
          <div className="step-header"><h2>Deal Terms</h2><p>Tell buyers what you're looking for — and how flexible you can be.</p></div>
          <Field label="Why Are You Selling? *" tip="This is one of the first questions every serious buyer asks — and one of the most important. Credible answers include: retirement, pursuing a new venture, health reasons, capital reallocation, or a partnership split. Be honest and specific — buyers will probe this deeply during due diligence. Vague or inconsistent answers are a significant red flag." value={data.whySelling} onChange={e=>set('whySelling',e.target.value)} placeholder="Retirement, new venture, health, capital redeployment, partnership split..." rows={3}/>
          <SelectField label="Ideal Timeline to Close" tip="How quickly do you want or need to complete the sale? A faster timeline ('ASAP') signals urgency and may attract buyers who are ready to move quickly. A longer window gives you time to run a competitive process and potentially negotiate a higher price. Most small business sales take 6–12 months from listing to close." tipHref="https://www.investopedia.com/terms/d/due-diligence.asp" value={data.timeline} onChange={v=>set('timeline',v)} opts={['ASAP (< 3 months)','3–6 months','6–12 months','12+ months','Flexible / No Rush']}/>
          <Picker label="Open to Seller Financing?" tip="Seller financing means you (the seller) agree to receive a portion of the purchase price over time rather than all cash at closing. It signals your confidence in the business's continued performance, makes the deal accessible to more buyers, and often results in a higher total sale price. It is extremely common in small business acquisitions." tipHref="https://www.investopedia.com/terms/s/seller-financing.asp" value={data.sellerFinancing} onChange={v=>set('sellerFinancing',v)} opts={['Yes','No','Maybe']}/>
          {(data.sellerFinancing==='Yes'||data.sellerFinancing==='Maybe')&&(
            <Field label="Seller Financing Terms / Preferences" tip="Describe your preferred seller financing structure. Typical terms: the financed percentage of the purchase price (e.g., 10–30%), the interest rate (typically 5–8% per year), and the repayment period (typically 3–7 years). These are fully negotiable and can be structured in many ways. Consult an M&A advisor or attorney for guidance." value={data.sfTerms} onChange={e=>set('sfTerms',e.target.value)} placeholder="e.g. Up to 20% seller note at 6% interest over 5 years"/>
          )}
          <Picker label="Willing to Stay On for a Transition Period?" tip="A transition period is a defined window after closing during which you remain involved to train the new owner, introduce them to key customers and vendors, and ensure a smooth operational handoff. Most buyers expect and strongly value this. Offering a transition period makes your business significantly more attractive and easier to close." value={data.transition} onChange={v=>set('transition',v)} opts={['Yes','No']}/>
          {data.transition==='Yes'&&(
            <SelectField label="How Long?" value={data.transitionDur} onChange={v=>set('transitionDur',v)} opts={['1 month','3 months','6 months','12 months','Negotiable']}/>
          )}
          <SelectField label="Preferred Deal Structure" tip="In an Asset Sale, the buyer purchases specific business assets (equipment, contracts, customer lists, IP) while the legal entity stays with you. In a Stock/Equity Sale, the buyer acquires the legal entity itself — inheriting all assets AND liabilities. Asset sales are more common and preferred by most buyers for tax reasons; stock sales may be preferred by sellers for capital gains treatment. Consult a tax advisor." tipHref="https://www.investopedia.com/terms/a/asset-acquisition.asp" value={data.dealStruct} onChange={v=>set('dealStruct',v)} opts={['Asset Sale','Stock Sale','Open / No Preference']}/>
          <Field label="Deal-Breakers or Non-Negotiables" tip="Conditions under which you would refuse to complete a sale regardless of price. Examples: the buyer must retain all current employees, the business cannot be relocated, there can be no earnout provisions, or the sale must close at full asking price with no contingencies. Stating these upfront saves time for both parties and prevents wasted due diligence." value={data.dealBreakers} onChange={e=>set('dealBreakers',e.target.value)} placeholder="What would cause you to walk away from a deal?" rows={2}/>
        </div>
      )}

      {/* Step 5 – Contact */}
      {step===5&&(
        <div>
          <div className="step-header"><h2>Your Contact Information</h2><p>Kept strictly private — only shared with verified buyers under NDA.</p></div>
          <div className="info-box-green">🔒 Your contact details are never displayed publicly. ExitReady only facilitates introductions after NDA execution.</div>
          <Field label="Full Name *" value={data.ownerName} onChange={e=>set('ownerName',e.target.value)} placeholder="Your full name"/>
          <Field label="Email Address *" value={data.ownerEmail} onChange={e=>set('ownerEmail',e.target.value)} placeholder="you@company.com"/>
          <Field label="Phone Number" value={data.ownerPhone} onChange={e=>set('ownerPhone',e.target.value)} placeholder="(555) 000-0000"/>
          <div style={{marginTop:'28px',padding:'20px',background:'var(--navy)',borderRadius:'12px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:'12px',fontWeight:'600',letterSpacing:'0.05em',color:'var(--slate)',marginBottom:'14px',textTransform:'uppercase'}}>Optional Document Uploads</div>
            {[
              ['📄','P&L / Financial Statements','PDF or Excel'],
              ['📊','Existing Pitch Deck','If you have one already'],
              ['📷','Business / Product Photos','Optional but helpful'],
              ['📃','Other Supporting Documents','Contracts, LOIs, etc.'],
            ].map(([icon,lbl,hint])=>(
              <div key={lbl} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                <div><span style={{marginRight:'8px'}}>{icon}</span>
                  <span style={{fontSize:'13px',color:'var(--cream)'}}>{lbl}</span>
                  <span style={{fontSize:'12px',color:'var(--slate)',marginLeft:'6px'}}>{hint}</span>
                </div>
                <button className="btn-outline" style={{fontSize:'12px',padding:'6px 14px',whiteSpace:'nowrap'}}>Upload</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Step 6 – Review */}
      {step===6&&(
        <div>
          <div className="step-header"><h2>Review & Submit</h2><p>Confirm your information before we generate your investor deck.</p></div>
          <div className="card" style={{marginBottom:'16px'}}>
            {[
              {title:'Business Overview',rows:[['Business Name',data.bizName||'—'],['Industry',data.industry],['Founded',data.founded||'—'],['Location',data.location||'—'],['Employees',`${data.employees||'—'} FT${data.empPT?` · ${data.empPT} PT`:''}`]]},
              {title:'Financials',rows:[['Revenue (Yr 1)',data.rev1||'—'],['EBITDA (Yr 1)',data.ebitda1||'—'],['Gross Margin',data.grossMargin||'—'],['Asking Price',data.asking||'—']]},
              {title:'Deal Terms',rows:[['Why Selling',data.whySelling||'—'],['Timeline',data.timeline],['Structure',data.dealStruct],['Seller Financing',data.sellerFinancing]]},
              {title:'Contact',rows:[['Name',data.ownerName||'—'],['Email',data.ownerEmail||'—'],['Phone',data.ownerPhone||'—']]},
            ].map(({title,rows},si)=>(
              <div key={title}>
                <div style={{fontSize:'11px',fontWeight:'600',letterSpacing:'0.05em',color:'var(--slate)',textTransform:'uppercase',padding:'12px 0 8px'}}>{title}</div>
                {rows.map(([k,v])=>(
                  <div className="review-row" key={k}><span className="key">{k}</span><span className="val">{v}</span></div>
                ))}
                {si<3&&<div className="divider"/>}
              </div>
            ))}
          </div>
          <div className="info-box-gold">✅ By submitting, you confirm all information is accurate to the best of your knowledge. Your watermarked deck will be generated instantly.</div>
        </div>
      )}

      {/* Nav */}
      <div className="nav-btns">
        {step>0?<button className="btn-outline" onClick={()=>{setStep(s=>s-1);window.scrollTo({top:0,behavior:'smooth'});}}>← Back</button>:<div/>}
        {step<STEP_LABELS.length-1
          ?<button className="btn-gold" onClick={()=>{setStep(s=>s+1);window.scrollTo({top:0,behavior:'smooth'});}}>Continue →</button>
          :<button className="btn-gold" style={{padding:'13px 36px',fontSize:'15px'}} onClick={()=>onDone(data)}>Generate My Deck 🚀</button>
        }
      </div>
    </div>
  );
}

function ResultView({formData,purchases,onPay,user,setView}){

  const [activeSlide,setActiveSlide]=useState(0);

  /* ── 5 rendered slide mini-previews ── */

    <div style={{position:'relative',background:'var(--navy3)',border:'1px solid var(--border)',borderRadius:'10px',overflow:'hidden',aspectRatio:'16/9',display:'flex',flexDirection:'column'}}>
      {/* slide header bar */}
      <div style={{background:'rgba(201,168,76,0.08)',borderBottom:'1px solid rgba(201,168,76,0.15)',padding:'5px 8px',display:'flex',alignItems:'center',gap:'5px',flexShrink:0}}>
        <div style={{width:'4px',height:'100%',background:'var(--gold)',borderRadius:'2px',alignSelf:'stretch'}}/>

          <div style={{fontSize:'18px'}}>🔒</div>
          <div style={{fontSize:'9px',fontWeight:'600',color:'var(--slate)',letterSpacing:'0.04em'}}>UNLOCK TO VIEW</div>
        </div>
      )}
    </div>
  );

  const MiniBar=({w,color='var(--gold)',h=6})=>(
    <div style={{height:`${h}px`,width:`${w}%`,background:color,borderRadius:'2px',marginBottom:'3px'}}/>
  );
  const MiniRow=({label,val,highlight})=>(
    <div style={{display:'flex',justifyContent:'space-between',borderBottom:'1px solid rgba(30,46,66,0.8)',padding:'2px 0',marginBottom:'1px'}}>
      <span style={{fontSize:'7px',color:'var(--slate)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:'55%'}}>{label}</span>
      <span style={{fontSize:'7px',fontWeight:'600',color:highlight?'var(--gold)':'var(--cream)'}}>{val}</span>
    </div>
  );

  const slide1Content=(
    <div>
      <div style={{fontSize:'7px',fontWeight:'700',color:'var(--gold)',letterSpacing:'0.08em',marginBottom:'3px',textTransform:'uppercase'}}>Confidential Investment Summary</div>
      <div style={{fontFamily:'DM Serif Display,serif',fontSize:'13px',color:'var(--cream)',lineHeight:1.1,marginBottom:'3px'}}>{formData.bizName||'Your Business'}</div>
      <div style={{fontSize:'7px',color:'var(--slate)',marginBottom:'6px'}}>{formData.industry||'Industry'} · Est. {formData.founded||'—'}</div>
      <div style={{height:'1px',background:'rgba(201,168,76,0.3)',marginBottom:'6px'}}/>
      <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
        {[['Asking',formData.asking||'TBD'],['Revenue',formData.rev1||'—'],['EBITDA',formData.ebitda1||'—']].map(([l,v])=>(
          <div key={l}><div style={{fontSize:'6px',color:'var(--slate)',textTransform:'uppercase',letterSpacing:'0.04em'}}>{l}</div><div style={{fontSize:'9px',fontWeight:'700',color:'var(--gold)'}}>{v}</div></div>
        ))}
      </div>
    </div>

function AdminDash({adminTab,setAdminTab,submissions,setSubmissions,selectedSub,setSelectedSub}){
  const [filter,setFilter]=useState('All');
  const [industryFilter,setIndustryFilter]=useState('All');
  const [purchaseFilter,setPurchaseFilter]=useState('All');
  const STATUSES=['All','New','Contacted','In Diligence','Passed','Closed'];
  const industries=['All',...[...new Set(submissions.map(s=>s.industry).filter(Boolean))]];

  const filtered=submissions.filter(s=>{
    if(filter!=='All'&&s.status!==filter)return false;
    if(industryFilter!=='All'&&s.industry!==industryFilter)return false;
    if(purchaseFilter==='Deck Paid'&&!s.deckPaid)return false;
    if(purchaseFilter==='Excel Paid'&&!s.excelPaid)return false;
    if(purchaseFilter==='Any Paid'&&!s.deckPaid&&!s.excelPaid)return false;
    if(purchaseFilter==='Free Only'&&(s.deckPaid||s.excelPaid))return false;
    return true;
  });

  const totalRevenue=submissions.reduce((acc,s)=>{if(s.deckPaid)acc+=49.99;if(s.excelPaid)acc+=29.99;return acc;},0);
  const paidCount=submissions.filter(s=>s.deckPaid||s.excelPaid).length;
  const STATUS_COLORS={New:'var(--gold)',Contacted:'var(--green)','In Diligence':'#6BAEE8',Passed:'var(--red)',Closed:'var(--slate)'};

  const exportToExcel=()=>{
    if(typeof XLSX==='undefined'){alert('XLSX library not loaded.');return;}
    const rows=[
      ['Business Name','Owner','Email','Phone','Industry','Revenue (Yr1)','Asking Price','Date Submitted','Deck Purchased','Excel Purchased','Status','Notes'],
      ...submissions.map(s=>[
        s.bizName,s.owner,s.email,s.phone,s.industry,s.rev1,s.asking,s.date,
        s.deckPaid?'Yes':'No',s.excelPaid?'Yes':'No',s.status||'New',s.notes||'',
      ]),
    ];
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:28},{wch:20},{wch:28},{wch:16},{wch:20},{wch:14},{wch:14},{wch:14},{wch:12},{wch:12},{wch:14},{wch:30}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,'Submissions',ws);
    XLSX.writeFile(wb,'ExitReady_Submissions.xlsx');
  };

  const updateStatus=(id,status)=>{
    setSubmissions(subs=>subs.map(s=>s.id===id?{...s,status}:s));
    if(selectedSub?.id===id)setSelectedSub(s=>({...s,status}));
  };
  const updateNote=(id,notes)=>{
    setSubmissions(subs=>subs.map(s=>s.id===id?{...s,notes}:s));
    if(selectedSub?.id===id)setSelectedSub(s=>({...s,notes}));
  };

  return(
    <div style={{padding:'32px',maxWidth:'1200px',margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'32px',flexWrap:'wrap',gap:'16px'}}>
        <div>
          <div className="badge badge-gold" style={{marginBottom:'8px'}}>Admin Access</div>
          <h2 className="serif" style={{fontSize:'30px',color:'var(--cream)'}}>ExitReady CRM</h2>
        </div>
        <div className="tabs">
          <button className={`tab${adminTab==='dashboard'?' active':''}`} onClick={()=>setAdminTab('dashboard')}>Dashboard</button>
          <button className={`tab${adminTab==='submissions'?' active':''}`} onClick={()=>setAdminTab('submissions')}>Submissions ({submissions.length})</button>
          {selectedSub&&<button className={`tab${adminTab==='detail'?' active':''}`} onClick={()=>setAdminTab('detail')}>Detail View</button>}
        </div>
      </div>

      {adminTab==='dashboard'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'14px',marginBottom:'28px'}}>
            {[['Total Submissions',submissions.length],['Paid Downloads',paidCount],['Conversion Rate',Math.round(paidCount/submissions.length*100)+'%'],['Total Revenue','$'+totalRevenue.toFixed(0)]].map(([l,n])=>(
              <div className="admin-stat" key={l}><div className="num">{n}</div><div className="lbl">{l}</div></div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px'}}>
            <div className="card">
              <div style={{fontWeight:'600',marginBottom:'18px',fontSize:'14px',color:'var(--cream)'}}>Pipeline by Status</div>
              {['New','Contacted','In Diligence','Passed','Closed'].map(s=>{
                const count=submissions.filter(x=>x.status===s).length;
                const pct=Math.round(count/submissions.length*100);
                return(
                  <div key={s} style={{marginBottom:'12px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:'13px',marginBottom:'5px'}}>
                      <span style={{color:'var(--slate)'}}>{s}</span>
                      <span style={{color:'var(--cream)',fontWeight:'500'}}>{count}</span>
                    </div>
                    <div className="progress-bar"><div style={{height:'100%',width:`${pct}%`,background:STATUS_COLORS[s],borderRadius:'2px',transition:'width 0.4s'}}/></div>
                  </div>
                );
              })}
            </div>
            <div className="card">
              <div style={{fontWeight:'600',marginBottom:'18px',fontSize:'14px',color:'var(--cream)'}}>Recent Submissions</div>
              {submissions.slice(0,4).map(s=>(
                <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>{setSelectedSub(s);setAdminTab('detail')}}>
                  <div>
                    <div style={{fontSize:'13px',fontWeight:'500',color:'var(--cream)',marginBottom:'2px'}}>{s.bizName}</div>
                    <div style={{fontSize:'12px',color:'var(--slate)'}}>{s.industry} · {s.date}</div>
                  </div>
                  <span className={`badge ${s.deckPaid?'badge-green':'badge-red'}`}>{s.deckPaid?'Paid':'Free'}</span>
                </div>
              ))}
              <button className="btn-ghost" style={{fontSize:'13px',color:'var(--gold)',padding:'16px 0 0',width:'100%',textAlign:'left'}} onClick={()=>setAdminTab('submissions')}>View all submissions →</button>
            </div>
          </div>
        </div>
      )}

      {adminTab==='submissions'&&(
        <div>
          {/* Status filters */}
          <div style={{display:'flex',gap:'8px',marginBottom:'12px',flexWrap:'wrap',alignItems:'center'}}>
            {STATUSES.map(s=>(
              <button key={s} className={`tab${filter===s?' active':''}`} onClick={()=>setFilter(s)}>
                {s} ({s==='All'?submissions.length:submissions.filter(x=>x.status===s).length})
              </button>
            ))}
          </div>
          {/* Industry + purchase filters + export */}
          <div style={{display:'flex',gap:'8px',marginBottom:'20px',flexWrap:'wrap',alignItems:'center'}}>
            <select value={industryFilter} onChange={e=>setIndustryFilter(e.target.value)} style={{width:'auto',padding:'6px 10px',fontSize:'12px'}}>
              {industries.map(i=><option key={i} value={i}>{i==='All'?'All Industries':i}</option>)}
            </select>
            <select value={purchaseFilter} onChange={e=>setPurchaseFilter(e.target.value)} style={{width:'auto',padding:'6px 10px',fontSize:'12px'}}>
              {['All','Any Paid','Deck Paid','Excel Paid','Free Only'].map(p=><option key={p}>{p}</option>)}
            </select>
            <span style={{fontSize:'12px',color:'var(--slate)',marginLeft:'4px'}}>{filtered.length} result{filtered.length!==1?'s':''}</span>
            <button className="btn-gold" style={{marginLeft:'auto',fontSize:'12px',padding:'7px 16px'}} onClick={exportToExcel}>↓ Export to Excel</button>
          </div>
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table className="admin-table">
                <thead>
                  <tr>{['Business','Owner','Email','Industry','Revenue','Asking','Date','Deck','Excel','Status',''].map((h,i)=><th key={i}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {filtered.map(s=>(
                    <tr key={s.id}>
                      <td style={{fontWeight:'500',whiteSpace:'nowrap'}}>{s.bizName}</td>
                      <td style={{whiteSpace:'nowrap'}}>{s.owner}</td>
                      <td style={{color:'var(--gold)',whiteSpace:'nowrap'}}>{s.email}</td>
                      <td style={{whiteSpace:'nowrap'}}>{s.industry}</td>
                      <td style={{whiteSpace:'nowrap'}}>{s.rev1}</td>
                      <td style={{whiteSpace:'nowrap'}}>{s.asking}</td>
                      <td style={{color:'var(--slate)',whiteSpace:'nowrap'}}>{s.date}</td>
                      <td><span className={`badge ${s.deckPaid?'badge-green':'badge-red'}`}>{s.deckPaid?'Paid':'Free'}</span></td>
                      <td><span className={`badge ${s.excelPaid?'badge-green':'badge-red'}`}>{s.excelPaid?'Paid':'Free'}</span></td>
                      <td>
                        <select value={s.status} onChange={e=>updateStatus(s.id,e.target.value)} style={{width:'auto',padding:'5px 8px',fontSize:'12px'}}>
                          {['New','Contacted','In Diligence','Passed','Closed'].map(o=><option key={o}>{o}</option>)}
                        </select>
                      </td>
                      <td><button className="btn-ghost" style={{fontSize:'12px',color:'var(--gold)',padding:'4px 8px'}} onClick={()=>{setSelectedSub(s);setAdminTab('detail')}}>View →</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {adminTab==='detail'&&selectedSub&&(
        <div>
          <button className="btn-ghost" style={{fontSize:'13px',color:'var(--slate)',marginBottom:'20px',padding:'0'}} onClick={()=>setAdminTab('submissions')}>← Back to Submissions</button>
          <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:'20px'}}>
            <div>
              <div className="card" style={{marginBottom:'16px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:'20px'}}>
                  <div>
                    <h3 className="serif" style={{fontSize:'22px',color:'var(--cream)',marginBottom:'4px'}}>{selectedSub.bizName}</h3>
                    <div style={{fontSize:'13px',color:'var(--slate)'}}>{selectedSub.industry} · Submitted {selectedSub.date}</div>
                  </div>
                  <select value={selectedSub.status} onChange={e=>updateStatus(selectedSub.id,e.target.value)} style={{width:'auto',padding:'7px 12px',fontSize:'13px'}}>
                    {['New','Contacted','In Diligence','Passed','Closed'].map(o=><option key={o}>{o}</option>)}
                  </select>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'20px'}}>
                  {[['Owner',selectedSub.owner],['Email',selectedSub.email],['Phone',selectedSub.phone],['Revenue',selectedSub.rev1],['Asking',selectedSub.asking],['Industry',selectedSub.industry]].map(([k,v])=>(
                    <div key={k} style={{background:'var(--navy)',borderRadius:'8px',padding:'10px 14px',border:'1px solid var(--border)'}}>
                      <div style={{fontSize:'11px',color:'var(--slate)',marginBottom:'3px',textTransform:'uppercase',letterSpacing:'0.04em'}}>{k}</div>
                      <div style={{fontSize:'13px',fontWeight:'500',color:'var(--cream)'}}>{v||'—'}</div>
                    </div>
                  ))}
                </div>
                <div className="field-group"><label>Internal Notes</label>
                  <textarea rows={4} value={selectedSub.notes} onChange={e=>updateNote(selectedSub.id,e.target.value)} placeholder="Add deal notes, follow-up reminders, diligence observations..."/>
                </div>
              </div>
            </div>
            <div>
              <div className="card" style={{marginBottom:'12px'}}>
                <div style={{fontWeight:'600',fontSize:'14px',marginBottom:'14px',color:'var(--cream)'}}>Quick Actions</div>
                {[['📧','Send Follow-Up Email'],['📞','Log Call Attempt'],['📋','Download Their Deck'],['📊','Download Excel Model'],['🤝','Request NDA Execution'],['✅','Mark as Closed']].map(([icon,action])=>(
                  <button key={action} className="btn-outline" style={{width:'100%',textAlign:'left',marginBottom:'8px',fontSize:'13px',padding:'9px 14px',display:'flex',alignItems:'center',gap:'8px'}}>
                    <span>{icon}</span>{action}
                  </button>
                ))}
              </div>
              <div className="card">
                <div style={{fontWeight:'600',fontSize:'14px',marginBottom:'14px',color:'var(--cream)'}}>Purchase History</div>
                {[['Investor Deck ($49.99)',selectedSub.deckPaid],['Excel Model ($29.99)',selectedSub.excelPaid]].map(([product,paid])=>(
                  <div key={product} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)',fontSize:'13px'}}>
                    <span style={{color:'var(--slate)'}}>{product}</span>
                    <span className={`badge ${paid?'badge-green':'badge-red'}`}>{paid?'Purchased':'Not Purchased'}</span>
                  </div>
                ))}
                <div style={{fontSize:'12px',color:'var(--slate)',marginTop:'14px',lineHeight:'1.6'}}>
                  Total spend: <strong style={{color:'var(--gold)'}}>${((selectedSub.deckPaid?49.99:0)+(selectedSub.excelPaid?29.99:0)).toFixed(2)}</strong>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
