<style>

  .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .radio-pill { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border2); color: var(--slate); font-size: 13px; cursor: pointer; transition: all 0.2s; user-select: none; font-family: 'DM Sans', sans-serif; }
  .radio-pill.selected { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }
  .radio-pill:hover:not(.selected) { border-color: var(--slatelight); color: var(--cream); }
  .range-row { display: flex; gap: 12px; align-items: center; }

  .tab.active { background: var(--navy2); color: var(--cream); border: 1px solid var(--border2); }
  .tab:hover:not(.active) { color: var(--cream); }
  .review-section { margin-bottom: 16px; }
  .review-section h4 { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--slate); text-transform: uppercase; margin-bottom: 10px; }

  .deck-preview { background: var(--navy2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin: 24px 0; }

  .upsell-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }

  .upsell-card:hover { border-color: rgba(201,168,76,0.4); transform: translateY(-1px); }
  .payment-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; backdrop-filter: blur(4px); }
  .payment-box { background: var(--navy2); border: 1px solid var(--border2); border-radius: 18px; padding: 36px; max-width: 460px; width: 100%; }
  .payment-box h3 { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 6px; color: var(--cream); }

  .pay-stripe { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy); }

  .pay-apple { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .pay-apple:hover { background: #f0f0f0; }
  .admin-wrap { padding: 36px 40px; max-width: 1160px; margin: 0 auto; }
  .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .admin-table th { text-align: left; padding: 10px 14px; color: var(--slate); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .admin-table td { padding: 11px 14px; border-bottom: 1px solid rgba(30,46,66,0.5); color: var(--cream); }
  .admin-table tr:hover td { background: rgba(26,37,53,0.5); }
  .admin-stat { background: var(--navy2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; }
  .admin-stat .num { font-family: 'DM Serif Display', serif; font-size: 34px; color: var(--gold); line-height: 1; }
  .admin-stat .lbl { font-size: 12px; color: var(--slate); margin-top: 5px; }
  .auth-wrap { max-width: 440px; margin: 64px auto; padding: 0 24px 80px; }
  .auth-toggle { text-align: center; font-size: 13px; color: var(--slate); margin-top: 18px; cursor: pointer; }
  .auth-toggle span { color: var(--gold); }
  .info-box-gold { background: rgba(201,168,76,0.05); border: 1px solid rgba(201,168,76,0.2); border-radius: 10px; padding: 14px 18px; font-size: 13px; color: var(--gold); }
  .info-box-green { background: rgba(82,183,136,0.05); border: 1px solid rgba(82,183,136,0.2); border-radius: 10px; padding: 14px 18px; font-size: 13px; color: var(--greenlight); }
  .notification { position: fixed; bottom: 28px; right: 28px; background: var(--navy2); border: 1px solid var(--gold); border-radius: 10px; padding: 14px 22px; font-size: 13px; color: var(--cream); z-index: 300; animation: slideUp 0.3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .footer { border-top: 1px solid var(--border); padding: 32px 48px; text-align: center; color: var(--slate); font-size: 13px; }
  @media (max-width: 768px) {
    .nav { padding: 14px 20px; }
    .hero { padding: 56px 20px 44px; }

    .features-grid { grid-template-columns: 1fr; padding: 40px 20px 60px; }
    .steps-row { grid-template-columns: 1fr; }
    .steps-section { padding: 0 20px 60px; }
    .pricing-grid { grid-template-columns: 1fr; }

</style>

<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const INDUSTRIES = ['SaaS / Software','E-commerce','Professional Services','Healthcare','Restaurant / Food','Retail','Manufacturing','Construction','Real Estate','Marketing Agency','Consulting','Logistics / Distribution','Education','Media / Content','Home Services','Other'];

const SAMPLE_SUBMISSIONS = [
  { id:1, biz:'Coastal Web Design Co.', owner:'Sarah Chen', email:'sarah@coastal.com', phone:'(555) 234-5678', industry:'Marketing Agency', revenue:'$380,000', asking:'$750,000', date:'Mar 12, 2026', deckPaid:true, excelPaid:false, status:'Contacted', notes:'Strong recurring revenue. Follow up this week.' },
  { id:2, biz:'TidewaterTech LLC', owner:'Marcus Webb', email:'mwebb@tt.com', phone:'(555) 876-4321', industry:'SaaS / Software', revenue:'$210,000', asking:'$525,000', date:'Mar 10, 2026', deckPaid:true, excelPaid:true, status:'In Diligence', notes:'Reviewing Q4 — revenue anomaly in Dec.' },
  { id:3, biz:'Blue Ridge Landscaping', owner:'Amy Tran', email:'amy@blr.com', phone:'(555) 112-9988', industry:'Home Services', revenue:'$580,000', asking:'$900,000', date:'Mar 8, 2026', deckPaid:false, excelPaid:false, status:'New', notes:'' },
  { id:4, biz:'Pinnacle Pet Care', owner:'Derek Osei', email:'derek@ppc.com', phone:'(555) 443-0099', industry:'Retail', revenue:'$165,000', asking:'$310,000', date:'Mar 5, 2026', deckPaid:true, excelPaid:false, status:'Passed', notes:'Margins too thin.' },
];

function generatePPTX(data, watermark) {
  if (typeof PptxGenJS === 'undefined') { alert('PptxGenJS not loaded. Check your internet connection.'); return; }
  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_16x9';
  const D='#0D1117', G='C9A84C', C='E8E4DC', S='8A9BB0';
  const addWM = (slide) => {
    if (!watermark) return;
    slide.addText('ExitReady — PREVIEW ONLY\nExitReady — PREVIEW ONLY', { x:0, y:1.2, w:'100%', h:3, fontSize:44, color:G, align:'center', rotate:330, transparency:87, bold:true });
  };
  // Slide 1 — Cover
  const s1 = pptx.addSlide();
  s1.background = { color: D.replace('#','') };
  s1.addShape(pptx.ShapeType.rect, { x:0, y:0, w:0.08, h:'100%', fill:{ color:G } });
  s1.addText('CONFIDENTIAL INVESTMENT SUMMARY', { x:0.5, y:0.35, w:9, h:0.3, fontSize:8, color:G, bold:true, charSpacing:4 });
  s1.addText(data.bizName||'Your Business', { x:0.5, y:0.8, w:9, h:1.4, fontSize:48, color:C, fontFace:'Georgia', bold:false });
  s1.addText((data.industry||'Industry')+' · Est. '+(data.founded||'—')+' · '+(data.location||''), { x:0.5, y:2.25, w:9, h:0.4, fontSize:14, color:S });
  s1.addShape(pptx.ShapeType.rect, { x:0.5, y:2.85, w:9, h:0.015, fill:{ color:G } });
  [['Asking Price',data.asking||'TBD'],['Revenue (TTM)',data.rev1||'—'],['EBITDA (TTM)',data.ebitda1||'—'],['Employees',(data.employees||'—')+' FT']].forEach(([l,v],i)=>{
    const x=0.5+i*2.3;
    s1.addText(l, { x, y:3.05, w:2.2, h:0.3, fontSize:8, color:S, bold:true, charSpacing:2 });
    s1.addText(v, { x, y:3.35, w:2.2, h:0.55, fontSize:20, color:G, bold:true });
  });
  s1.addText('Prepared by ExitReady | exitready.com', { x:0.5, y:5.0, w:9, h:0.3, fontSize:9, color:S, align:'right' });
  addWM(s1);
  // Slide 2 — Executive Summary
  const s2 = pptx.addSlide();
  s2.background = { color: D.replace('#','') };
  s2.addText('EXECUTIVE SUMMARY', { x:0.5, y:0.3, w:9, h:0.3, fontSize:8, color:G, bold:true, charSpacing:4 });
  s2.addText(data.bizName||'Business Overview', { x:0.5, y:0.65, w:7, h:0.65, fontSize:30, color:C, fontFace:'Georgia' });
  s2.addShape(pptx.ShapeType.rect, { x:0.5, y:1.38, w:4.5, h:0.012, fill:{ color:G } });
  ['▸  '+(data.description||'Business description not provided.'),'▸  Revenue: '+(data.rev1||'—')+' TTM | EBITDA: '+(data.ebitda1||'—')+' | Gross Margin: '+(data.grossMargin||'—'),'▸  Team: '+(data.employees||'—')+' FT employees | Owner dependency: '+data.ownerDep+'/5','▸  Active customers: '+(data.activeCust||'—')+' | Avg. contract: '+(data.avgContract||'—'),'▸  Asking: '+(data.asking||'—')+' | Structure: '+(data.dealStruct||'—')+' | Close: '+(data.timeline||'—'),'▸  Reason for sale: '+(data.whySelling||'—')].forEach((b,i)=>{
    s2.addText(b, { x:0.5, y:1.6+i*0.58, w:9, h:0.52, fontSize:12, color:i===0?C:S });
  });
  addWM(s2);
  // Slides 3-8 abbreviated for remaining slides
  ['FINANCIAL HIGHLIGHTS','OPERATIONS SNAPSHOT','MARKET & GROWTH','DEAL TERMS','WHY BUY?','NEXT STEPS'].forEach((title,idx)=>{
    const s = pptx.addSlide();
    s.background = { color: D.replace('#','') };
    s.addText(title, { x:0.5, y:0.3, w:9, h:0.3, fontSize:8, color:G, bold:true, charSpacing:4 });
    if (idx===0) {
      s.addText('Three-Year Financial Performance', { x:0.5, y:0.65, w:7, h:0.65, fontSize:28, color:C, fontFace:'Georgia' });
      [['Revenue (Yr 1)',data.rev1||'—'],['Revenue (Yr 2)',data.rev2||'—'],['Revenue (Yr 3)',data.rev3||'—'],['EBITDA (Yr 1)',data.ebitda1||'—'],['Gross Margin',data.grossMargin||'—'],['MRR',data.mrr||'N/A']].forEach(([k,v],i)=>{
        const col=i<3?0:1; const row=i<3?i:i-3;
        s.addText(k, { x:0.5+col*4.8, y:1.65+row*0.8, w:4.5, h:0.3, fontSize:9, color:S, bold:true });
        s.addText(v, { x:0.5+col*4.8, y:1.93+row*0.8, w:4.5, h:0.38, fontSize:16, color:C });
      });
      s.addText('Asking Price: '+(data.asking||'—')+'   |   Valuation basis: '+(data.valJustification||'—'), { x:0.5, y:5.0, w:9, h:0.3, fontSize:10, color:S });
    } else if (idx===3) {
      s.addText('Deal Structure & Terms', { x:0.5, y:0.65, w:7, h:0.65, fontSize:28, color:C, fontFace:'Georgia' });
      [['Asking Price',data.asking||'—'],['Deal Structure',data.dealStruct||'—'],['Seller Financing',data.sellerFinancing||'—'],['Transition Period',data.transition==='Yes'?data.transitionDur:'Not offered'],['Target Close',data.timeline||'—'],['Why Selling',(data.whySelling||'—').slice(0,50)]].forEach(([k,v],i)=>{
        const col=i<3?0:1; const row=i<3?i:i-3;
        s.addText(k, { x:0.5+col*4.8, y:1.65+row*0.82, w:4.5, h:0.3, fontSize:9, color:S, bold:true });
        s.addText(v, { x:0.5+col*4.8, y:1.93+row*0.82, w:4.5, h:0.4, fontSize:12, color:C });
      });
    } else if (idx===5) {
      s.addText('Ready to Explore This Opportunity?', { x:0.5, y:0.65, w:9, h:0.65, fontSize:28, color:C, fontFace:'Georgia' });
      s.addShape(pptx.ShapeType.rect, { x:0.5, y:1.5, w:3.5, h:0.015, fill:{ color:G } });
      ['01  Sign our mutual NDA','02  Receive full financial package','03  Schedule intro call with seller','04  Submit Letter of Intent (LOI)'].forEach((st,i)=>{
        s.addText(st, { x:0.5, y:1.8+i*0.65, w:9, h:0.55, fontSize:15, color:i===0?G:S });
      });
      s.addText('Contact: '+(data.name||'—')+'  |  '+(data.email||'—')+'  |  '+(data.phone||'—'), { x:0.5, y:4.6, w:9, h:0.35, fontSize:11, color:S });
    } else {
      s.addText('See full detail in clean investor version', { x:0.5, y:1.5, w:9, h:0.5, fontSize:18, color:S });
    }
    addWM(s);
  });
  pptx.writeFile({ fileName:(data.bizName||'ExitReady')+'_InvestorDeck'+(watermark?'_Preview':'_Clean')+'.pptx' });
}

function App() {
  const [view, setView] = useState('landing');
  const [user, setUser] = useState(null);
  const [formData, setFormData] = useState({});
  const [payModal, setPayModal] = useState(false);
  const [payProduct, setPayProduct] = useState(null);
  const [purchases, setPurchases] = useState({ deck:false, excel:false });
  const [notification, setNotification] = useState(null);
  const [adminView, setAdminView] = useState('dashboard');
  const [selectedSub, setSelectedSub] = useState(null);
  const [submissions, setSubmissions] = useState(SAMPLE_SUBMISSIONS);

  const notify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3500); };
  const handlePayConfirm = () => {
    const np = { ...purchases };
    if (payProduct === 'deck') np.deck = true;
    if (payProduct === 'excel') np.excel = true;
    if (payProduct === 'bundle') { np.deck = true; np.excel = true; }
    setPurchases(np);
    setPayModal(false);
    if (payProduct === 'excel') { generateExcel(formData); notify('Excel financial model downloaded!'); }
    else if (payProduct === 'deck') { generatePPTX(formData, false); notify('Clean investor deck downloaded!'); }
    else { generatePPTX(formData, false); generateExcel(formData); notify('Bundle downloaded — deck + Excel!'); }
  };

  return (
    <div>
      <Nav view={view} setView={setView} user={user} setUser={setUser} />
      {view==='landing' && <Landing setView={setView} />}
      {view==='auth' && <Auth onAuth={(u)=>{ setUser(u); setView('form'); }} />}
      {view==='form' && <IntakeForm user={user} onDone={(d)=>{ setFormData(d); setView('result'); }} />}
      {view==='result' && <ResultView formData={formData} purchases={purchases} onPay={(p)=>{ setPayProduct(p); setPayModal(true); }} />}
      {view==='admin' && <AdminDash adminView={adminView} setAdminView={setAdminView} submissions={submissions} setSubmissions={setSubmissions} selectedSub={selectedSub} setSelectedSub={setSelectedSub} />}
      {payModal && <PayModal product={payProduct} onConfirm={handlePayConfirm} onClose={()=>setPayModal(false)} />}
      {notification && <div className="notification">✓ {notification}</div>}
      <div className="footer">© 2026 ExitReady · All rights reserved · <span style={{color:'var(--gold)',cursor:'pointer'}}>Privacy</span> · <span style={{color:'var(--gold)',cursor:'pointer'}}>Terms</span> · <span style={{color:'var(--gold)',cursor:'pointer'}}>Contact</span></div>
    </div>
  );
}

                      <span style={{color:'var(--cream)',fontWeight:'600'}}>{count}</span>
                    </div>
                    <div className="progress-bar"><div style={{height:'100%',width:`${pct}%`,background:colors[s],borderRadius:'2px',transition:'width 0.4s'}} /></div>
                  </div>
                );
              })}
            </div>
            <div className="card">
              <div style={{fontWeight:'600',marginBottom:'16px',fontSize:'14px',color:'var(--cream)'}}>Recent Submissions</div>
              {submissions.slice(0,5).map(s=>(
                <div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>{ setSelectedSub(s); setAdminView('detail'); }}>
                  <div>
                    <div style={{fontSize:'13px',fontWeight:'600',color:'var(--cream)'}}>{s.biz}</div>
                    <div style={{fontSize:'12px',color:'var(--slate)'}}>{s.industry} · {s.date}</div>
                  </div>
                  <span className={`badge ${s.status==='New'?'badge-gold':s.status==='Passed'?'badge-red':s.status==='In Diligence'?'badge-blue':'badge-green'}`}>{s.status}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {adminView==='submissions' && (
        <div>
          <div style={{display:'flex',gap:'6px',marginBottom:'20px',flexWrap:'wrap'}}>
            {['All','New','Contacted','In Diligence','Passed','Closed'].map(s=>(
              <button key={s} className={`tab${filter===s?' active':''}`} onClick={()=>setFilter(s)}>{s}</button>
            ))}
          </div>
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table className="admin-table">
                <thead><tr>{['Business','Owner','Email','Industry','Revenue','Asking','Date','Deck','Excel','Status','Action'].map(h=><th key={h}>{h}</th>)}</tr></thead>
                <tbody>
                  {filtered.map(s=>(
                    <tr key={s.id}>
                      <td style={{fontWeight:'600'}}>{s.biz}</td>
                      <td>{s.owner}</td>
                      <td style={{color:'var(--gold)'}}>{s.email}</td>
                      <td style={{color:'var(--slate)'}}>{s.industry}</td>
                      <td>{s.revenue}</td>
                      <td style={{fontWeight:'600'}}>{s.asking}</td>
                      <td style={{color:'var(--slate)'}}>{s.date}</td>
                      <td><span className={`badge ${s.deckPaid?'badge-green':'badge-red'}`}>{s.deckPaid?'Paid':'Free'}</span></td>
                      <td><span className={`badge ${s.excelPaid?'badge-green':'badge-red'}`}>{s.excelPaid?'Paid':'Free'}</span></td>
                      <td><select value={s.status} onChange={e=>updateStatus(s.id,e.target.value)} style={{width:'auto',padding:'4px 8px',fontSize:'12px'}}>{['New','Contacted','In Diligence','Passed','Closed'].map(o=><option key={o}>{o}</option>)}</select></td>
                      <td><button className="btn-ghost" style={{fontSize:'12px',color:'var(--gold)',padding:'4px 8px'}} onClick={()=>{ setSelectedSub(s); setAdminView('detail'); }}>View →</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {adminView==='detail' && selectedSub && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:'20px'}}>
          <div>
            <div className="card" style={{marginBottom:'16px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'18px',flexWrap:'wrap',gap:'10px'}}>
                <div>
                  <div style={{fontFamily:'DM Serif Display',fontSize:'22px',color:'var(--cream)',marginBottom:'4px'}}>{selectedSub.biz}</div>
                  <div style={{fontSize:'13px',color:'var(--slate)'}}>{selectedSub.industry} · Submitted {selectedSub.date}</div>
                </div>
                <select value={selectedSub.status} onChange={e=>updateStatus(selectedSub.id,e.target.value)} style={{width:'auto',padding:'7px 12px',fontSize:'13px'}}>
                  {['New','Contacted','In Diligence','Passed','Closed'].map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'18px'}}>
                {[['Owner',selectedSub.owner],['Email',selectedSub.email],['Phone',selectedSub.phone],['Revenue',selectedSub.revenue],['Asking',selectedSub.asking],['Deck',selectedSub.deckPaid?'Purchased':'Free']].map(([k,v])=>(
                  <div key={k} style={{background:'var(--navy)',borderRadius:'8px',padding:'10px 14px',border:'1px solid var(--border)'}}>
                    <div style={{fontSize:'11px',color:'var(--slate)',marginBottom:'3px',textTransform:'uppercase',letterSpacing:'0.05em'}}>{k}</div>
                    <div style={{fontSize:'13px',fontWeight:'600',color:k==='Email'?'var(--gold)':'var(--cream)'}}>{v}</div>
                  </div>
                ))}
              </div>
              <div className="field-group" style={{marginBottom:0}}>
                <label>Internal Notes</label>
                <textarea rows={4} value={selectedSub.notes} onChange={e=>updateNotes(selectedSub.id,e.target.value)} placeholder="Add deal notes, call logs, observations..." />
              </div>
            </div>
          </div>
          <div>
            <div className="card" style={{marginBottom:'12px'}}>
              <div style={{fontWeight:'600',fontSize:'14px',marginBottom:'14px',color:'var(--cream)'}}>Quick Actions</div>
              {[['📧','Send Follow-Up Email'],['📞','Log Call Attempt'],['📋','Download Their Deck'],['📊','Download Their Model'],['🤝','Request NDA'],['🗂️','Export to CSV']].map(([icon,a])=>(
                <button key={a} className="btn-outline" style={{width:'100%',textAlign:'left',marginBottom:'8px',fontSize:'13px',padding:'9px 14px'}}>
                  <span style={{marginRight:'8px'}}>{icon}</span>{a}
                </button>
              ))}
            </div>
            <div className="card">
              <div style={{fontWeight:'600',fontSize:'14px',marginBottom:'14px',color:'var(--cream)'}}>Purchase History</div>
              {[['Investor Deck ($49.99)',selectedSub.deckPaid],['Excel Model ($29.99)',selectedSub.excelPaid]].map(([p,paid])=>(
                <div key={p} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--border)',fontSize:'13px',alignItems:'center'}}>
                  <span style={{color:'var(--slate)'}}>{p}</span>
                  <span className={`badge ${paid?'badge-green':'badge-red'}`}>{paid?'Purchased':'Not Purchased'}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
